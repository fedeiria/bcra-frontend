<div class="login-container">
    <div class="login-card">

        <div class="login-header">
            <div class="brand-logo">
                <span class="brand-main">CENTRAL</span>
                <span class="brand-sub">de <span>DEUDORES</span></span>
            </div>
            <p>Plataforma de Análisis Crediticio BCRA</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" formControlName="email" class="form-control-custom"
                    [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" formControlName="password" class="form-control-custom"
                    [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            </div>

            @if(errorMessage) {
                <div class="error-alert">
                    <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage }}
                </div>
            }

            <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
                @if(!isLoading) {
                    <span>Iniciar Sesión</span>
                }
                @if(isLoading) {
                        <span class="loader"></span>
                }
            </button>
        </form>

        <div class="login-footer">
            <p>Sistema de Consulta Interna &copy; 2026</p>
        </div>
    </div>
</div>
