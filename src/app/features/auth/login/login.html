<div class="login-container">
    <div class="login-card">

        <div class="login-header">
            <div class="brand-logo">
                <span class="brand-main">CENTRAL</span>
                <span class="brand-sub">de <span>DEUDORES</span></span>
            </div>
            <p>Plataforma Integral Crediticia</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-container">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" formControlName="email" class="form-control-custom" placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-container">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" formControlName="password" class="form-control-custom" placeholder="••••••••">
                </div>
            </div>

            @if(errorMessage) {
                <div class="error-alert">
                    <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage }}
                </div>
            }

            <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
                @if(!isLoading) {
                    <span>Iniciar Sesión</span>
                }
                @if(isLoading) {
                    <span class="loader"></span>
                }
            </button>
        </form>

        <div class="login-footer">
            <div class="disclaimer-text">
                <p>
                    <i class="bi bi-info-circle"></i>
                    Plataforma de consultas BCRA. Sitio No Oficial.
                </p>
            </div>
            <div class="footer-info">
                <p class="copyright">Copyright &copy; {{ currentYear }}</p>
            </div>
        </div>
    </div>
</div>
